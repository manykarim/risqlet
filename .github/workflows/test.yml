# Cross-platform test workflow.
#
# Why three OSes: `risqlet setup` was broken on Windows for every user until a bug
# report, and `ci init --target claude-hooks` never worked anywhere. Both shipped
# because the only thing that ever ran risqlet was a Linux dev box with an editable
# install — the one configuration no user has.
#
# Every OS runs the *whole* suite. Platform differences are expressed as skips
# inside the suite (see the `posix_only` marker and conftest's
# pytest_collection_modifyitems), never as a per-OS test selection here: a skip is
# visible in the run and states its reason, while a test left out of a hand-written
# selection is simply absent, and absence reads as green.
#
# The suite includes tests/test_packaging.py::TestCleanInstall, which builds the
# wheel, installs it into a fresh venv with no dev dependencies, and drives the real
# console script from outside the repo — so "clean installation" and "usage in a
# coding agent" are checked on each platform without writing per-OS shell steps
# here, which would reintroduce the portability problem this workflow exists to
# catch.

name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one platform's failure must not hide another's
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync

      # -rs reports skips with their reasons, so an unsupported component is
      # visible in the log rather than passing silently
      - name: Test
        run: uv run pytest -q -rs

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync
      # ruff is platform-independent; running it three times buys nothing
      - run: uv run ruff check .
