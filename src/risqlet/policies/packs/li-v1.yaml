# Scoring policy: lightweight 3x3 likelihood x impact matrix.
id: li-v1
description: 3x3 likelihood x impact matrix (lightweight profile)
factors:
  likelihood: {min: 1, max: 3}   # 1 low, 2 medium, 3 high
  impact: {min: 1, max: 3}       # 1 low, 2 medium, 3 high
derived:
  priority:
    type: lookup
    bands:
      - {when: {likelihood: "3", impact: "3"}, value: critical}
      - {when: {likelihood: "3", impact: "2"}, value: high}
      - {when: {likelihood: "2", impact: "3"}, value: high}
      - {when: {likelihood: "2", impact: "2"}, value: medium}
      - {when: {likelihood: "3", impact: "1"}, value: medium}
      - {when: {likelihood: "1", impact: "3"}, value: medium}
      - {default: low}
ranking:
  field: priority
  order: [critical, high, medium, low]
