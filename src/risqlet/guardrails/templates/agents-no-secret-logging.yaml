id: agents-no-secret-logging
title: Never log or commit secrets (advisory)
surface: agents-md
enforcement: soft
barriers: [prevent]
selectors:
  aspects: [iso25010.confidentiality, iso25010.security]
  catalog_refs: [owasp-web.cryptographic-failures, owasp-web.security-logging-and-monitoring-failures]
  tags: [secrets, leakage]
params: []
body: |
  Never write secrets, tokens, API keys, or credentials into code, logs, error
  messages, fixtures, or commits. Read configuration from the environment or a
  secret manager; never hard-code or echo it. Redact sensitive values in any
  diagnostic output.
