id: secret-scan-posttool
title: Post-write secret scan (blocking)
surface: claude-hook
enforcement: hard
barriers: [prevent, detect]
selectors:
  aspects: [iso25010.confidentiality, iso25010.security]
  catalog_refs: [owasp-web.cryptographic-failures, owasp-web.security-logging-and-monitoring-failures]
  tags: [secrets, leakage]
params: [paths]
command: |
  f="$RISQLET_HOOK_FILE"; case "$f" in {{paths_case}}) grep -nEiq '(api[_-]?key|secret|token|password|BEGIN [A-Z ]*PRIVATE KEY)' "$f" && { echo 'risqlet: possible secret in changed file'; exit 2; } ;; esac; exit 0
verify:
  tools: [grep, bash]
  blocking: true
  input: file
  fixture: probe.env
  benign: "timeout = 30\nhost = localhost\n"
  violation: "api_key = 'AKIAIOSFODNN7EXAMPLE'\n"
body: |
  PostToolUse hook (matcher Write|Edit) — after a write under {{paths}}, scan the
  changed file for secret-shaped strings and block on a hit. risqlet installs the
  verified command below (Claude sets CLAUDE_TOOL_FILE_PATH).
