id: secret-scan-posttool
title: Post-write secret scan (blocking)
surface: claude-hook
enforcement: hard
barriers: [prevent, detect]
selectors:
  aspects: [iso25010.confidentiality, iso25010.security]
  catalog_refs: [owasp-web.cryptographic-failures, owasp-web.security-logging-and-monitoring-failures]
  tags: [secrets, leakage]
params: [paths]
body: |
  PostToolUse hook (matcher Write|Edit) — after a write under {{paths}}, scan the
  changed file for secret-shaped strings and block on a hit:
  {
    "matcher": "Write|Edit",
    "hooks": [{
      "type": "command",
      "command": "f=\"$CLAUDE_TOOL_FILE_PATH\"; case \"$f\" in {{paths_case}}) grep -nEi '(api[_-]?key|secret|token|password|BEGIN [A-Z ]*PRIVATE KEY)[\"'\"'\"' :=]' \"$f\" && { echo 'risqlet: possible secret in changed file — blocked'; exit 2; } ;; esac; exit 0"
    }]
  }
