id: precommit-secret-scan
title: Pre-commit secret scan (universal)
surface: pre-commit
enforcement: hard
barriers: [prevent, detect]
selectors:
  aspects: [iso25010.confidentiality, iso25010.security]
  catalog_refs: [owasp-web.cryptographic-failures]
  tags: [secrets, leakage]
params: []
body: |
  .pre-commit-config.yaml repo entry — block commits that introduce secrets:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
