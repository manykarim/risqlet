id: lint-format-posttool
title: Lint changed Python files (blocking on error)
surface: claude-hook
enforcement: hard
barriers: [detect]
selectors:
  aspects: [iso25010.maintainability]
  tags: [quality, style]
params: []
command: |
  f="$RISQLET_HOOK_FILE"; case "$f" in *.py) ruff check --quiet "$f" || { echo 'risqlet: lint errors'; exit 2; } ;; esac; exit 0
verify:
  tools: [ruff, bash]
  blocking: true
  input: file
  fixture: probe.py
  benign: "x = 1\n"
  violation: "import os, sys\nx=1\n"
body: |
  PostToolUse hook (matcher Write|Edit) — run the linter on the changed Python
  file and block on an error. risqlet installs the verified command below.
