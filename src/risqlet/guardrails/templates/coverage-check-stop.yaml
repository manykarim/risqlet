id: coverage-check-stop
title: Block session end on coverage regression (blocking)
surface: claude-hook
enforcement: hard
barriers: [detect]
selectors:
  aspects: [iso25010.testability, iso25010.reliability]
  tags: [coverage, tests]
params: []
body: |
  Stop hook — refuse to end the session if the test suite is red or coverage
  fell. Wire it to your project's test command:
  {
    "hooks": [{
      "type": "command",
      "command": "risqlet trace status --json >/dev/null 2>&1; make test >/dev/null 2>&1 || { echo 'risqlet: tests failing — resolve before ending'; exit 2; }"
    }]
  }
